version: '3.8'

services:
  kloudkut:
    build: .
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./config:/app/config
      - ./reports:/app/reports
    command: ["--json", "/app/reports/findings.json", "--html", "/app/reports/report.html"]

  dashboard:
    build: .
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - KLOUDKUT_TOKEN=${KLOUDKUT_TOKEN}
    command: ["python", "dashboard.py"]
