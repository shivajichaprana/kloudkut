name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt pytest build

      - run: pytest tests/ -v --tb=short

      - run: python -m build

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
